name: Обновяване на пазарни цени

on:
  # Автоматично на 9-то число всеки месец в 8:00 UTC (11:00 българско)
  schedule:
    - cron: "0 8 9 * *"

  # Ръчно пускане от GitHub → Actions → Run workflow
  workflow_dispatch:
    inputs:
      reason:
        description: "Причина за ръчно пускане (незадължително)"
        required: false
        default: "Ръчна актуализация"

jobs:
  update-prices:
    name: Обнови цени от imot.bg
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Изтегли кода
        uses: actions/checkout@v4

      - name: Настрой Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: admin/requirements.txt

      - name: Инсталирай зависимости
        run: pip install -r admin/requirements.txt

      - name: Изпълни скрипта за обновяване
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python admin/update_prices.py
        # Скриптът връща exit 0 дори при scraping failure.
        # exit 1 само ако Supabase е недостъпен (критична грешка).

      - name: Резюме
        if: always()
        run: |
          echo "──────────────────────────────────────"
          echo "Workflow завършен."
          echo "Baseline стойностите винаги се записват."
          echo "Scraping от imot.bg може да е блокиран от CI/CD IP."
          echo "За актуални цени: пусни локално от Mac."
          echo "──────────────────────────────────────"
